        function formatDate(timestamp) {
            if (!timestamp) return 'غير محدد';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return 'الآن';
            if (minutes < 60) return `منذ ${minutes} دقيقة`;
            if (hours < 24) return `منذ ${hours} ساعة`;
            if (days < 7) return `منذ ${days} يوم`;
            return date.toLocaleDateString('ar-EG');
        }

        // ========== Encryption & Device ID ==========
        const SECRET_SALT = 'ALL_ARAB_SERVICES_SECURE_SALT_2025_V3';
        
        async function generateSecureDeviceId() {
            const fp = [
                navigator.userAgent,
                screen.width,
                screen.height,
                navigator.language,
                navigator.platform,
                screen.colorDepth,
                navigator.hardwareConcurrency,
                new Date().getTimezoneOffset(),
                navigator.deviceMemory || 4
            ].join('|');
            const encoder = new TextEncoder();
            const data = encoder.encode(fp + SECRET_SALT);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        function encryptData(data) {
            try {
                return btoa(encodeURIComponent(JSON.stringify(data)));
            } catch { return null; }
        }
        
        function decryptData(encrypted) {
            try {
                return JSON.parse(decodeURIComponent(atob(encrypted)));
            } catch { return null; }
        }

        // ========== API Calls ==========
        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = { 
                method, 
                headers: { 'Content-Type': 'application/json' } 
            };
            if (body) options.body = JSON.stringify(body);
            try {
                const response = await fetch(`${API_URL}${endpoint}`, options);
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
                return data;
            } catch (error) {
                console.error('API Error:', error);
                if (!isOnline) {
                    // Store for later sync
                    const pending = JSON.parse(localStorage.getItem('pending_api') || '[]');
                    pending.push({ endpoint, method, body, timestamp: Date.now() });
                    localStorage.setItem('pending_api', JSON.stringify(pending));
                    throw new Error('أنت حالياً أوفلاين - سيتم المزامنة لاحقاً');
                }
                throw error;
            }
        }

        // ========== Data Loading with Pagination ==========
        async function loadData(reset = true) {
            if (reset) {
                allServices = [];
                lastDoc = null;
                hasMore = true;
            }
            
            if (isLoading || !hasMore) return;
            isLoading = true;
            
            const loaderText = document.getElementById('loaderText');
            if (loaderText) loaderText.innerText = 'جاري تحميل الخدمات...';
            
            try {
                let servicesQuery = query(
                    collection(db, 'services'),
                    where('status', '==', 'approved'),
                    orderBy('createdAt', 'desc'),
                    limit(ITEMS_PER_PAGE)
                );
                
                if (lastDoc) {
                    servicesQuery = query(
                        collection(db, 'services'),
                        where('status', '==', 'approved'),
                        orderBy('createdAt', 'desc'),
                        startAfter(lastDoc),
                        limit(ITEMS_PER_PAGE)
                    );
                }
                
                const snapshot = await getDocs(servicesQuery);
                const newServices = snapshot.docs.map(doc => ({ 
                    id: doc.id, 
                    ...doc.data(),
                    createdAt: doc.data().createdAt?.toDate?.() || doc.data().createdAt
                }));
                
                if (reset) {
                    allServices = newServices;
                } else {
                    allServices = [...allServices, ...newServices];
                }
                
                lastDoc = snapshot.docs[snapshot.docs.length - 1];
                hasMore = snapshot.docs.length === ITEMS_PER_PAGE;
                
                // Cache data
                localStorage.setItem('cached_services', encryptData(allServices));
                
            } catch (error) {
                console.error('Load data error:', error);
                const cached = localStorage.getItem('cached_services');
                if (cached && allServices.length === 0) {
                    allServices = decryptData(cached) || [];
                    showToast('تم التحميل من النسخة المحفوظة', 'info');
                }
            } finally {
                isLoading = false;
            }
        }

                filtered = filtered.filter(s =>

                    (s.establishment && s.establishment.toLowerCase().includes(query)) ||

                        <p class="text-xs text-slate-500 text-center mt-2">اسحب لتحديد المنطقة (نسبة 1:1)</p>
                    `);
                    const img = document.getElementById('cropImage');
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(img, {
                        aspectRatio: 1,
                        viewMode: 1,
                        autoCropArea: 0.8,
                        background: false
                    });
                    document.getElementById('applyCropBtn').onclick = () => {
                        const canvas = cropper.getCroppedCanvas({ width: 800, height: 800 });
                        canvas.toBlob((blob) => {
                            onCropped(blob);

            };

                        <label class="block text-sm font-bold mb-2">وصف المشكلة</label>
                        <textarea id="reportDescription" rows="3" class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-blue-500" placeholder="اشرح المشكلة بالتفصيل..."></textarea>
                    </div>
                    <button onclick="submitReport('${targetType}', '${targetId}')" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold">
                        إرسال البلاغ
                    </button>
                </div>
            `);
        };
        
        window.submitReport = async (targetType, targetId) => {
            const reason = document.getElementById('reportReason').value;
            const description = document.getElementById('reportDescription').value.trim();
            
            if (!reason) {
                showToast('اختر سبب البلاغ', 'error');
                return;
            }
            
            showLoading();
            try {
                const result = await apiCall('/api/reports/create', 'POST', {
                    uid: currentUser.uid,
                    targetType,
                    targetId,
                    reason,
                    description
                });
                closeModal(document.querySelector('.fixed'));
                showToast(result.autoResolved ? '✅ تم اتخاذ إجراء تلقائي' : '✅ تم إرسال بلاغك للمشرف', 'success');
                logEvent(analytics, 'report_submitted', { targetType, reason });
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                hideLoading();
            }
        };
        
        // ========== Contact & Info ==========
        window.showInstructions = () => {
            showModal(`
                <h3 class="font-bold text-xl mb-4 text-center">📖 تعليمات الاستخدام</h3>
                <div class="space-y-4">
                    <div class="bg-blue-50 p-4 rounded-xl">
                        <p class="font-bold mb-2">🎯 كيف تحجز منتج؟</p>
                        <ol class="list-decimal list-inside space-y-1 text-sm">
                            <li>اختر المنتج المطلوب</li>
                            <li>اضغط "حجز المنتج"</li>
                            <li>يخصم 15% كنقاط عربون</li>
                            <li>تواصل مع البائع عبر واتساب</li>
                        </ol>
                    </div>
                    <div class="bg-green-50 p-4 rounded-xl">
                        <p class="font-bold mb-2">💎 كيف تكسب نقاط؟</p>
                        <ul class="list-disc list-inside space-y-1 text-sm">
                            <li>+150 نقطة عند التسجيل</li>
                            <li>+10 نقاط عند إضافة خدمة</li>
                            <li>+50 نقطة لكل صديق يسجل بكودك</li>
                            <li>+5 نقاط عند تقييم منتج</li>
                        </ul>
                    </div>
                    <div class="bg-purple-50 p-4 rounded-xl">
                        <p class="font-bold mb-2">📌 ملاحظات مهمة</p>
                        <ul class="list-disc list-inside space-y-1 text-sm">
                            <li>العربون المستقطع غير قابل للاسترداد</li>
                            <li>الدفع الحقيقي يتم خارج التطبيق</li>
                            <li>المنصة وسيط فقط، غير مسؤولة عن المعاملات</li>
                        </ul>
                    </div>
                </div>
            `);
        };
        
        window.showPrivacyPolicy = () => {
            showModal(`
                <h3 class="font-bold text-xl mb-4 text-center">🔒 سياسة الخصوصية</h3>
                <div class="space-y-3 text-sm">
                    <p>نحن في منصة الخدمات المتكاملة نولي خصوصية بياناتك أهمية كبيرة.</p>
                    <p><strong>البيانات التي نجمعها:</strong> الاسم، رقم الجوال، الصور، عنوان IP.</p>
                    <p><strong>كيف نستخدم بياناتك:</strong> لتقديم الخدمات، تحسين التجربة، التواصل معك.</p>
                    <p><strong>مشاركة البيانات:</strong> لا نشارك بياناتك مع أي طرف ثالث إلا بموافقتك.</p>
                    <p><strong>حماية البيانات:</strong> جميع البيانات مشفرة ومخزنة بشكل آمن في Firebase.</p>
                    <p><strong>حقوقك:</strong> يمكنك طلب حذف بياناتك في أي وقت.</p>
                    <div class="bg-blue-50 p-3 rounded-xl mt-3 text-center">
                        📞 للاستفسار: واتساب ${ADMIN_WHATSAPP}
                    </div>
                </div>
            `);
        };
        
        window.showContactUs = () => {
            showModal(`
                <h3 class="font-bold text-xl mb-4 text-center">📞 اتصل بنا</h3>
                <div class="space-y-4 text-center">
                    <div class="bg-green-50 p-4 rounded-xl">
                        <i class="fa-brands fa-whatsapp text-3xl text-green-500 mb-2"></i>
                        <p class="font-bold">واتساب</p>
                        <a href="https://wa.me/${ADMIN_WHATSAPP}" target="_blank" class="text-green-600">${ADMIN_WHATSAPP}</a>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl">
                        <i class="fa-regular fa-envelope text-3xl text-blue-500 mb-2"></i>
                        <p class="font-bold">البريد الإلكتروني</p>
                        <a href="mailto:support@allarabservices.com" class="text-blue-600">support@allarabservices.com</a>
                    </div>
                    <p class="text-xs text-slate-500">نسعد بتواصلكم وملاحظاتكم</p>
                </div>
            `);
        };
        
        window.showAboutUs = () => {
            showModal(`
                <h3 class="font-bold text-xl mb-4 text-center">🌟 عن المنصة</h3>
                <div class="space-y-3 text-center">
                    <div class="w-20 h-20 mx-auto bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-cubes text-white text-3xl"></i>
                    </div>
                    <h4 class="font-bold text-lg">منصة الخدمات المتكاملة</h4>
                    <p class="text-sm text-slate-600">منصة عربية تهدف إلى ربط مقدمي الخدمات مع العملاء بشكل آمن وسهل.</p>
                    <div class="bg-gray-50 p-3 rounded-xl">
                        <p class="font-bold">الإصدار</p>
                        <p>${APP_VERSION}</p>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-xl">
                        <p class="font-bold">© 2025</p>
                        <p>جميع الحقوق محفوظة</p>
                    </div>
                </div>
            `);
        };
        
        // ========== Utility Functions ==========
        window.clearCache = () => {
            if (confirm('هل أنت متأكد من مسح الذاكرة المؤقتة؟ سيتم حذف البيانات المحفوظة.')) {
                localStorage.clear();
                showToast('تم مسح الذاكرة المؤقتة', 'success');
                setTimeout(() => location.reload(), 1000);
            }
        };
        
        window.refreshData = () => {
            showToast('جاري تحديث البيانات...', 'info');
            loadData(true);
            if (currentPage === 'home') renderHome();
        };
        
        window.contactSeller = async (sellerId, serviceName) => {
            try {
                const userDoc = await getDoc(doc(db, 'users', sellerId));
                const phone = userDoc.data()?.phone;
                if (phone) {
                    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(`السلام عليكم، أرغب في الاستفسار عن خدمة ${serviceName}`)}`, '_blank');
                } else {
                    showToast('رقم البائع غير متوفر', 'error');
                }
            } catch (error) {
                showToast('فشل التواصل مع البائع', 'error');
            }
        };
        
        window.showQuickActions = () => {
            showModal(`
                <div class="space-y-3 text-center">
                    <button onclick="showAddServiceModal(); closeModal(document.querySelector('.fixed'))" class="w-full bg-blue-500 text-white py-3 rounded-xl flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus"></i> إضافة خدمة
                    </button>
                    <button onclick="showAddServiceModal(); closeModal(document.querySelector('.fixed'))" class="w-full bg-green-500 text-white py-3 rounded-xl flex items-center justify-center gap-2">
                        <i class="fa-solid fa-cart-shopping"></i> إضافة منتج
                    </button>
                    <button onclick="requestUpgrade(); closeModal(document.querySelector('.fixed'))" class="w-full bg-purple-500 text-white py-3 rounded-xl flex items-center justify-center gap-2">
                        <i class="fa-solid fa-crown"></i> طلب ترقية
                    </button>
                </div>
            `);
        };
        
        // ========== Notifications System ==========
        async function loadNotifications() {
            if (!currentUser) return;
            try {
                const data = await apiCall(`/api/notifications/${currentUser.uid}?limit=30`);
                notifications = data.notifications || [];
                unreadCount = notifications.filter(n => !n.read).length;
                const badge = document.getElementById('notifBadge');
                if (unreadCount > 0) {
                    badge.classList.remove('hidden');
                    badge.innerText = unreadCount > 9 ? '9+' : unreadCount;
                } else {
                    badge.classList.add('hidden');
                }
            } catch (error) {
                console.error('Load notifications error:', error);
            }
        }
        
        window.showNotificationsModal = () => {
            const notifsHtml = notifications.map(n => `
                <div class="border-b p-3 cursor-pointer hover:bg-gray-50 transition ${!n.read ? 'bg-blue-50' : ''}" onclick="markNotificationRead('${n.id}')">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="font-bold text-sm">${n.title}</p>
                            <p class="text-xs text-slate-600">${n.body}</p>
                            <p class="text-xs text-slate-400 mt-1">${n.createdAt || 'الآن'}</p>
                        </div>
                        ${!n.read ? '<div class="w-2 h-2 bg-blue-500 rounded-full mt-1"></div>' : ''}
                    </div>
                </div>
            `).join('') || '<p class="text-center text-slate-500 py-8">لا توجد إشعارات</p>';
            
            showModal(`
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-xl">🔔 الإشعارات</h3>
                    ${unreadCount > 0 ? `
                        <button onclick="markAllNotificationsRead()" class="text-blue-600 text-sm">
                            تحديد الكل كمقروء
                        </button>
                    ` : ''}
                </div>
                <div class="max-h-96 overflow-y-auto">
                    ${notifsHtml}
                </div>
            `);
        };
        
        window.markNotificationRead = async (notifId) => {
            try {
                await apiCall(`/api/notifications/${notifId}/read`, 'PUT');
                await loadNotifications();
                const modal = document.querySelector('.fixed');
                if (modal) showNotificationsModal();
            } catch (error) {
                console.error('Mark read error:', error);
            }
        };
        
        window.markAllNotificationsRead = async () => {
            try {
                await apiCall('/api/notifications/mark-all-read', 'PUT', { uid: currentUser.uid });
                await loadNotifications();
                showNotificationsModal();
            } catch (error) {
                console.error('Mark all read error:', error);
            }
        };
        
        // ========== Real-time Listeners ==========
        function initRealtimeListeners() {
            if (!currentUser) return;
            
            // User data listener
            const userUnsub = onSnapshot(doc(db, 'users', currentUser.uid), (doc) => {
                if (!doc.exists()) return;
                const newData = doc.data();
                const oldPoints = currentUser.points;
                currentUser = { ...currentUser, ...newData };
                if (newData.points !== oldPoints && newData.points > oldPoints) {
                    showToast(`💎 +${newData.points - oldPoints} نقطة`, 'success');
                }
                updatePointsDisplay();
                if (newData.role !== currentUser.role && newData.role === 'admin') {
                    document.getElementById('adminBtn').classList.remove('hidden');
                    showToast('🎉 تمت ترقيتك إلى مشرف!', 'success');
                }
            });
            
            // Notifications listener
            const notifUnsub = onSnapshot(
                query(collection(db, 'notifications'), where('userId', '==', currentUser.uid), orderBy('createdAt', 'desc'), limit(20)),
                () => loadNotifications()
            );
            
            realtimeListeners.push(userUnsub, notifUnsub);
        }
        
        // ========== Edit Service ==========
        window.editService = async (serviceId) => {
            const service = allServices.find(s => s.id === serviceId);
            if (!service) return;
            
            const catOptions = CATEGORIES.map(c => `<option value="${c.id}" ${c.id === service.category_id ? 'selected' : ''}>${c.name}</option>`).join("");
            const currencyOptions = CURRENCIES.map(c => `<option value="${c.code}" ${c.code === service.currency ? 'selected' : ''}>${c.name} (${c.symbol})</option>`).join("");
            
            showModal(`
                <h3 class="font-bold text-xl mb-4 text-center">✏️ تعديل الخدمة</h3>
                <div class="space-y-4 max-h-96 overflow-y-auto px-1">
                    <div>
                        <label class="block text-sm font-bold mb-1">اسم المنشأة</label>
                        <input id="editEstablishment" class="w-full border rounded-xl p-3" value="${service.establishment || ''}">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">اسم المنتج</label>
                        <input id="editProductName" class="w-full border rounded-xl p-3" value="${service.productName || ''}">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">القسم</label>
                        <select id="editCat" class="w-full border rounded-xl p-3">${catOptions}</select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">السعر</label>
                        <div class="flex gap-2">
                            <input id="editBasePrice" type="number" step="0.01" class="flex-1 border rounded-xl p-3" value="${service.basePrice || 0}">
                            <select id="editCurrency" class="w-1/3 border rounded-xl p-3">${currencyOptions}</select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">نسبة الخصم %</label>
                        <input id="editDiscount" type="number" min="0" max="100" class="w-full border rounded-xl p-3" value="${service.discountPercent || 0}">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">رقم الجوال</label>
                        <input id="editPhone" class="w-full border rounded-xl p-3" value="${service.contact || ''}">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">الوصف</label>
                        <textarea id="editDescription" rows="3" class="w-full border rounded-xl p-3">${service.description || ''}</textarea>
                    </div>
                    <button id="saveServiceBtn" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-3 rounded-xl font-bold">
                        حفظ التغييرات
                    </button>
                </div>
            `);
            
            document.getElementById('saveServiceBtn').onclick = async () => {
                const updates = {
                    establishment: document.getElementById('editEstablishment').value.trim(),
                    productName: document.getElementById('editProductName').value.trim(),
                    category_id: document.getElementById('editCat').value,
                    basePrice: parseFloat(document.getElementById('editBasePrice').value),
                    currency: document.getElementById('editCurrency').value,
                    discountPercent: parseFloat(document.getElementById('editDiscount').value) || 0,
                    contact: document.getElementById('editPhone').value.trim(),
                    description: document.getElementById('editDescription').value.trim()
                };
                
                const cat = CATEGORIES.find(c => c.id === updates.category_id);
                updates.category_name = cat?.name || '🛠️ خدمات عامة';
                updates.price = updates.discountPercent > 0 ? 
                    updates.basePrice * (1 - updates.discountPercent / 100) : 
                    updates.basePrice;
                
                showLoading();
                try {
                    await apiCall(`/api/services/${serviceId}`, 'PUT', {
                        uid: currentUser.uid,
                        updates
                    });
                    showToast('تم تحديث الخدمة بنجاح', 'success');
                    closeModal(document.querySelector('.fixed'));
                    await loadData(true);
                    renderMyServices();
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    hideLoading();
                }
            };
        };
        
        // ========== App Initialization ==========
        async function initApp() {
            try {
                await initUser();
                await loadData(true);
                initRealtimeListeners();
                await loadNotifications();
                
                hideLoader();
                renderHome();
                
                if (isOnline) syncPendingData();
                
                // Log app start
                logEvent(analytics, 'app_started', { version: APP_VERSION, userId: currentUser?.uid });
                
            } catch (error) {
                console.error('Start failed:', error);
                const cached = localStorage.getItem('cached_services');
                if (cached && allServices.length === 0) {
                    allServices = decryptData(cached) || [];
                    hideLoader();
                    renderHome();
                    showToast('تم التحميل من النسخة المحفوظة', 'info');
                } else {
                    document.getElementById('loaderText').innerText = 'فشل التحميل. تأكد من الاتصال';
                    document.getElementById('loaderDetail').innerText = 'حاول تحديث الصفحة';
                }
            }
        }
        
        // Start the app
        initApp();
    </script>
</body>
</html>
