    <script type="module">
        // ======================== 1. التشفير + Device ID الآمن ========================
        const SECRET_SALT = 'PLAT_2024_SECURE_SALT_V1'; // غيره لسلسلة معقدة
        
        async function generateSecureDeviceId() {
            const fp = navigator.userAgent + screen.width + screen.height + navigator.language + navigator.platform;
            const encoder = new TextEncoder();
            const data = encoder.encode(fp + SECRET_SALT);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        function encryptData(data) {
            return btoa(encodeURIComponent(JSON.stringify(data)));
        }
        
        function decryptData(encrypted) {
            try {
                return JSON.parse(decodeURIComponent(atob(encrypted)));
            } catch {
                return null;
            }
        }
        
        // ======================== 2. المتغيرات الأساسية ========================
        let currentUser = null;
        let allServices = [];
        let allCoupons = [];
        let isOnline = navigator.onLine;
        const APP_VERSION = '1.0.0'; // للتحديثات
        
        const ADMIN_WHATSAPP = "967773458975";
        
        const CATEGORIES = [
            { id: "health", name: "🏥 صحة ومستشفيات", icon: "fa-hospital-user", color: "blue" },
            { id: "finance", name: "💰 خدمات مالية", icon: "fa-chart-line", color: "green" },
            { id: "hotels", name: "🏨 فنادق وسياحة", icon: "fa-hotel", color: "purple" },
            { id: "restaurants", name: "🍽️ مطاعم", icon: "fa-utensils", color: "orange" },
            { id: "fashion", name: "👗 ملابس وأزياء", icon: "fa-shirt", color: "pink" },
            { id: "realestate", name: "🏠 عقارات", icon: "fa-building", color: "red" },
            { id: "education", name: "📚 تعليم", icon: "fa-graduation-cap", color: "indigo" },
            { id: "services", name: "🛠️ خدمات عامة", icon: "fa-wrench", color: "slate" }
        ];
        
        const CURRENCIES = [
            { code: "YER", symbol: "ر.ي", name: "ريال يمني" },
            { code: "SAR", symbol: "ر.س", name: "ريال سعودي" },
            { code: "USD", symbol: "$", name: "دولار أمريكي" }
        ];

        // ======================== 3. مراقبة الاتصال + التحديثات ========================
        window.addEventListener('online', () => {
            isOnline = true;
            document.getElementById('offlineBanner').classList.add('hidden');
            showToast('✅ تم استعادة الاتصال', 'success');
            checkForUpdates();
            syncPendingData();
        });
        
        window.addEventListener('offline', () => {
            isOnline = false;
            document.getElementById('offlineBanner').classList.remove('hidden');
            showToast('⚠️ أنت أوفلاين - الوضع المحلي مفعل', 'info');
        });
        
        async function checkForUpdates() {
            if (!isOnline) return;
            try {
                const versionDoc = await getDoc(doc(db, 'config', 'app_version'));
                const serverVersion = versionDoc.data()?.version;
                if (serverVersion && serverVersion !== APP_VERSION) {
                    showToast('🔄 يوجد تحديث جديد! أعد تحميل الصفحة', 'info');
                }
            } catch (e) {
                console.log('Update check failed:', e);
            }
        }
        
        // ======================== 4. تهيئة المستخدم مع Firebase Auth ========================
        async function initUser() {
            document.getElementById('loaderText').innerText = 'جاري التحقق من الهوية...';
            
            const deviceId = await generateSecureDeviceId();
            
            return new Promise((resolve) => {
                onAuthStateChanged(auth, async (firebaseUser) => {
                    if (!firebaseUser) {
                        // تسجيل دخول مجهول لأول مرة
                        await signInAnonymously(auth);
                        return;
                    }
                    
                    // جلب بيانات المستخدم من Firestore
                    const userRef = doc(db, 'users', firebaseUser.uid);
                    const userSnap = await getDoc(userRef);
                    
                    if (userSnap.exists()) {
                        currentUser = userSnap.data();
                        // تحديث deviceId لو تغير
                        if (currentUser.deviceId !== deviceId) {
                            currentUser.deviceId = deviceId;
                            await setDoc(userRef, currentUser, { merge: true });
                        }
                    } else {
                        // مستخدم جديد
                        const urlParams = new URLSearchParams(window.location.search);
                        const refCode = urlParams.get('ref');
                        
                        currentUser = {
                            uid: firebaseUser.uid,
                            deviceId: deviceId,
                            name: "زائر جديد",
                            phone: "",
                            points: 100,
                            role: "user",
                            referralCode: deviceId.substr(-8).toUpperCase(),
                            referredBy: refCode || null,
                            createdAt: Date.now(),
                            lastLogin: Date.now(),
                            appVersion: APP_VERSION
                        };
                        await setDoc(userRef, currentUser);
                        showToast("👋 مرحباً بك! تم إضافة 100 نقطة ترحيبية", "success");
                    }
                    
                    document.getElementById("points").innerText = currentUser.points;
                    resolve();
                });
            });
        }
        
        // ======================== 5. تحميل البيانات مع Cache ========================
        async function loadData() {
            document.getElementById('loaderText').innerText = 'جاري تحميل الخدمات...';
            
            // Firebase تلقائياً يجيب من الكاش لو أوفلاين
            const servicesQuery = query(
                collection(db, 'services'), 
                where('status', '==', 'approved'),
                orderBy('createdAt', 'desc'),
                limit(50)
            );
            
            const snapshot = await getDocs(servicesQuery);
            allServices = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // حفظ نسخة مشفرة محلياً للطوارئ
            localStorage.setItem('cached_services', encryptData(allServices));
        }
        
        // ======================== 6. دوال مساعدة ========================
        window.showToast = (msg, type = "success") => {
            const toast = document.createElement("div");
            toast.className = `px-4 py-2 rounded-xl shadow-lg text-white text-sm ${type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'} transition-all duration-300 z-50`;
            toast.innerHTML = `<i class="fa-${type === 'success' ? 'solid fa-check' : type === 'error' ? 'solid fa-exclamation' : 'solid fa-info'} ml-2"></i>${msg}`;
            document.getElementById("toastRoot").innerHTML = "";
            document.getElementById("toastRoot").appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };
        
        // ======================== 7. بدء التشغيل ========================
        async function startApp() {
            try {
                await initUser();
                await loadData();
                await checkForUpdates();
                
                document.getElementById("loader").style.display = "none";
                document.getElementById("app").classList.remove("hidden");
                renderHome();
                
                // مزامنة البيانات المعلقة لو كان أوفلاين
                if (isOnline) syncPendingData();
                
            } catch (error) {
                console.error('Start failed:', error);
                // محاولة التحميل من الكاش المشفر
                const cached = localStorage.getItem('cached_services');
                if (cached) {
                    allServices = decryptData(cached) || [];
                    document.getElementById("loader").style.display = "none";
                    document.getElementById("app").classList.remove("hidden");
                    renderHome();
                    showToast('تم التحميل من النسخة المحفوظة', 'info');
                } else {
                    document.getElementById('loaderText').innerText = 'فشل التحميل. تأكد من الاتصال';
                }
            }
        }
        
        async function syncPendingData() {
            // مزامنة أي بيانات تم إنشاؤها أوفلاين
            const pending = JSON.parse(localStorage.getItem('pending_sync') || '[]');
            if (pending.length === 0) return;
            
            showToast(`جاري مزامنة ${pending.length} عنصر...`, 'info');
            // الكود الكامل في الجزء 2
        }
        
        // بدء التطبيق
        startApp();
        
        // ======================== 8. دالة renderHome مؤقتة - الكاملة في الجزء 2 ========================
        window.renderHome = () => {
            const html = `
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-xl">✨ أحدث الخدمات</h2>
                    <span class="text-xs text-slate-500">الإصدار ${APP_VERSION}</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    ${allServices.slice(0, 10).map(s => `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden">
                            <img src="${s.image}" class="w-full h-32 object-cover" onerror="this.src='https://placehold.co/400x300'">
                            <div class="p-3">
                                <p class="text-xs text-slate-600 truncate">${s.establishment}</p>
                                <h3 class="font-semibold text-sm truncate">${s.productName}</h3>
                                <p class="text-blue-600 font-bold text-sm mt-1">${s.price} ${s.currency}</p>
                            </div>
                        </div>
                    `).join('') || '<p class="col-span-full text-center text-slate-500">لا توجد خدمات</p>'}
                </div>
            `;
            document.getElementById("mainContent").innerHTML = html;
        };
        
        
// ======================== 9. API Helper ========================
const API_URL = 'https://your-app.onrender.com'; // استبدله برابط Render

async function apiCall(endpoint, method = 'GET', body = null) {
    const options = {
        method,
        headers: { 'Content-Type': 'application/json' }
    };
    if (body) options.body = JSON.stringify(body);

    const response = await fetch(`${API_URL}${endpoint}`, options);
    return await response.json();
}

// ======================== 10. رفع صورة + إنشاء خدمة ========================
window.createServiceWithImage = async (serviceData, imageBlob) => {
    try {
        // تحويل الصورة لـ Base64
        const reader = new FileReader();
        const imageBase64 = await new Promise((resolve) => {
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(imageBlob);
        });

        const result = await apiCall('/api/services/create', 'POST', {
            uid: currentUser.uid,
            serviceData: serviceData,
            imageBase64: imageBase64
        });

        if (result.success) {
            showToast('✅ تم إنشاء الخدمة بنجاح', 'success');
            return result.service;
        } else {
            showToast(result.error || 'فشل إنشاء الخدمة', 'error');
            return null;
        }
    } catch (error) {
        showToast('خطأ في الاتصال بالسيرفر', 'error');
        return null;
    }
};

// ======================== 11. نظام الإشعارات في الواجهة ========================
window.loadNotifications = async () => {
    const result = await apiCall(`/api/notifications/${currentUser.uid}`);
    if (result.success) {
        const unreadCount = result.notifications.filter(n =>!n.read).length;
        document.getElementById('notifBadge')?.innerText = unreadCount || '';
        return result.notifications;
    }
    return [];
};

// ======================== 12. رفع الصور مع القص الحقيقي ========================
let cropper = null;
let currentCroppedBlob = null;

window.openImageCropper = (onCropped) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
            showToast('حجم الصورة يجب أن يكون أقل من 5MB', 'error');
            return;
        }
        const reader = new FileReader();
        reader.onload = (event) => {
            showModal(`
                <h3 class="font-bold mb-3">✂️ قص الصورة</h3>
                <div class="mb-3"><img id="cropImage" src="${event.target.result}" style="max-width:100%;"></div>
                <button id="applyCropBtn" class="bg-blue-600 text-white py-2 rounded-xl w-full">تطبيق القص ✅</button>
                <p class="text-xs text-slate-500 text-center mt-2">اسحب لتحديد المنطقة (نسبة 1:1)</p>
            `);
            const img = document.getElementById('cropImage');
            if (cropper) cropper.destroy();
            cropper = new Cropper(img, {
                aspectRatio: 1,
                viewMode: 1,
                autoCropArea: 0.8,
                background: false
            });
            document.getElementById('applyCropBtn').onclick = () => {
                const canvas = cropper.getCroppedCanvas({ width: 800, height: 800 });
                canvas.toBlob((blob) => {
                    onCropped(blob);
                    document.querySelector(".modal-backdrop").remove();
                }, "image/jpeg", 0.85);
            };
        };
        reader.readAsDataURL(file);
    };
    input.click();
};

            document.getElementById("imagePreviewArea").classList.remove("hidden");
            document.getElementById("previewImg").src = url;
            showToast("تم قص الصورة بنجاح", "success");
        });
    };

    window.updateFinalPrice = () => {
        const basePrice = parseFloat(document.getElementById("newBasePrice").value) || 0;
        const discount = parseFloat(document.getElementById("newDiscount").value) || 0;
        const currency = document.getElementById("newCurrency").value;
        const symbol = CURRENCIES.find(c => c.code === currency)?.symbol || '';

        if (basePrice > 0) {
            const finalPrice = discount > 0? basePrice - (basePrice * discount / 100) : basePrice;
            const saved = basePrice - finalPrice;
            document.getElementById("finalPricePreview").classList.remove("hidden");
            document.getElementById("finalPriceValue").innerText = `${finalPrice.toFixed(2)} ${symbol}`;
            document.getElementById("savedAmount").innerText = discount > 0? `${saved.toFixed(2)} ${symbol}` : '-';
        } else {
            document.getElementById("finalPricePreview").classList.add("hidden");
        }
    };

    document.getElementById("confirmAddService").onclick = async () => {
        const btn = document.getElementById("confirmAddService");
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري النشر...';

        const establishment = document.getElementById("newEstablishment").value.trim();
        const productName = document.getElementById("newProductName").value.trim();
        const catId = document.getElementById("newCat").value;
        const basePrice = parseFloat(document.getElementById("newBasePrice").value);
        const discountPercent = parseFloat(document.getElementById("newDiscount").value) || 0;
        const currency = document.getElementById("newCurrency").value;
        const phone = document.getElementById("newPhone").value.trim();
        const description = document.getElementById("newDescription").value.trim();

        if (!establishment ||!productName ||!basePrice ||!phone ||!selectedImageBlob) {
            showToast("الرجاء ملء جميع الحقول الإلزامية", "error");
            btn.disabled = false;
            btn.innerHTML = '✅ نشر الخدمة';
            return;
        }

        if (discountPercent < 0 || discountPercent > 100) {
            showToast("نسبة الخصم يجب أن تكون بين 0 و 100", "error");
            btn.disabled = false;
            btn.innerHTML = '✅ نشر الخدمة';
            return;
        }

        const cat = CATEGORIES.find(c => c.id === catId);
        const serviceData = {
            establishment, productName, description,
            category_id: catId, category_name: cat.name,
            basePrice, discountPercent, currency, contact: phone
        };

        const result = await createServiceWithImage(serviceData, selectedImageBlob);
        if (result) {
            document.querySelector(".modal-backdrop")?.remove();
            renderMyServices();
        }
        btn.disabled = false;
        btn.innerHTML = '✅ نشر الخدمة';
    };
};

function getStatusColor(status) {
    const colors = {
        pending: 'bg-yellow-100 text-yellow-700',
        confirmed: 'bg-blue-100 text-blue-700',
        completed: 'bg-green-100 text-green-700',
        cancelled: 'bg-red-100 text-red-700'
    };
    return colors[status] || 'bg-gray-100 text-gray-700';
}

function getStatusText(status) {
    const map = {
        pending: 'قيد الانتظار',
        confirmed: 'تم التأكيد',
        completed: 'مكتمل',
        cancelled: 'ملغي'
    };
    return map[status] || status;
}

            <p class="text-xs text-slate-600 mt-2">رصيدك الحالي: ${currentUser.points} نقطة</p>
        </div>
        <div class="mb-3">

            <input id="reserveCouponCode" class="w-full border rounded-xl p-2" placeholder="WELCOME50">
        </div>
        <button id="confirmReserve" class="bg-green-600 text-white py-3 rounded-xl w-full font-bold">
            تأكيد الحجز وخصم العربون
        </button>
        <p class="text-xs text-slate-500 text-center mt-2">الدفع الحقيقي يتم كاش بعد الاتفاق مع البائع</p>
    `);

    document.getElementById('confirmReserve').onclick = async () => {
        const couponCode = document.getElementById('reserveCouponCode').value.trim();

        if (currentUser.points < depositPoints) {
            showToast('رصيد النقاط غير كافي للحجز', 'error');
            return;
        }

        const btn = document.getElementById('confirmReserve');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الحجز...';

        const result = await apiCall('/api/orders/reserve', 'POST', {
            uid: currentUser.uid,
            serviceId: serviceId,
            couponCode: couponCode || null
        });

        if (result.success) {
            // تحديث الرصيد محلياً
            currentUser.points -= result.depositPoints;
            document.getElementById("points").innerText = currentUser.points;

            document.querySelector(".modal-backdrop")?.remove();
            showToast('✅ تم الحجز بنجاح', 'success');

        } else {
            showToast(result.error || 'فشل الحجز', 'error');
            btn.disabled = false;
            btn.innerHTML = 'تأكيد الحجز وخصم العربون';
        }
    };
};

let notificationsUnsubscribe = null;
let ordersUnsubscribe = null;
let userDataUnsubscribe = null;

function initRealtimeListeners() {
    // 1. مراقبة بيانات المستخدم - الترقية توصل فوراً
    if (userDataUnsubscribe) userDataUnsubscribe();
    userDataUnsubscribe = onSnapshot(doc(db, 'users', currentUser.uid), (doc) => {
        if (!doc.exists()) return;
        const newData = doc.data();
        const oldRole = currentUser.role;
        const oldPoints = currentUser.points;

        // تحديث البيانات المحلية
        currentUser = { ...currentUser, ...newData };

        // إشعار ترقية
        if (newData.role !== oldRole) {
            showToast(`🎉 تمت ترقيتك إلى ${newData.role === 'premium_user' ? 'عضو مميز' : 'منشأة مميزة'}!`, 'success');
            document.getElementById("points").innerText = currentUser.points;
            renderCurrentPage();
        }

        // إشعار تغيير النقاط
        if (newData.points !== oldPoints) {
            const diff = newData.points - oldPoints;
            if (diff > 0) showToast(`💎 +${diff} نقطة`, 'success');
            document.getElementById("points").innerText = currentUser.points;
        }
    });

    // 2. مراقبة الإشعارات الجديدة
    if (notificationsUnsubscribe) notificationsUnsubscribe();
    notificationsUnsubscribe = onSnapshot(
        query(
            collection(db, 'notifications'),
            where('userId', '==', currentUser.uid),
            where('read', '==', false),
            orderBy('createdAt', 'desc'),
            limit(1)
        ),
        (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === 'added') {
                    const notif = change.doc.data();
                    showToast(`🔔 ${notif.title}`, 'info');
                    playNotificationSound();
                    updateNotifBadge();
                }
            });
        }
    );

    // 3. مراقبة الطلبات الجديدة - للبائع
    if (ordersUnsubscribe) ordersUnsubscribe();
    ordersUnsubscribe = onSnapshot(
        query(
            collection(db, 'orders'),
            where('sellerId', '==', currentUser.uid),
            where('status', '==', 'reserved'),
            orderBy('createdAt', 'desc')
        ),
        (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === 'added') {
                    const order = change.doc.data();
                    showToast(`📦 طلب جديد: ${order.serviceName}`, 'success');
                    playNotificationSound();
                }
            });
        }
    );
}

let searchCache = new Map();
let lastSearchTerm = '';
let searchDebounceTimer = null;

// بحث ذكي مع كاش
async function smartSearch(term, filters = {}) {
    if (!term.trim()) return renderHome();

    const cacheKey = `${term}_${JSON.stringify(filters)}`;

    // 1. تحقق من الكاش أولاً
    if (searchCache.has(cacheKey)) {
        displaySearchResults(searchCache.get(cacheKey), term);
        return;
    }

    // 2. بحث محلي سريع
    let results = allServices.filter(s => {
        const searchLower = term.toLowerCase();
        const matchText = s.productName.toLowerCase().includes(searchLower) ||
                         s.establishment.toLowerCase().includes(searchLower) ||
                         s.description?.toLowerCase().includes(searchLower);

        // فلاتر
        const matchCategory =!filters.category || s.category_id === filters.category;
        const matchPrice = (!filters.minPrice || s.price >= filters.minPrice) &&
                          (!filters.maxPrice || s.price <= filters.maxPrice);
        const matchRating =!filters.minRating || (s.avgRating || 0) >= filters.minRating;
        const matchDiscount =!filters.hasDiscount || s.discountPercent > 0;

        return matchText && matchCategory && matchPrice && matchRating && matchDiscount;
    });

    // 3. حفظ في الكاش
    searchCache.set(cacheKey, results);
    if (searchCache.size > 50) searchCache.delete(searchCache.keys().next().value); // حد الكاش

    displaySearchResults(results, term);
}

                ` : ''}
                <button onclick="showCouponsModal()" class="bg-amber-500 text-white py-2 rounded-xl w-full">🎟️ كوبوناتي</button>
                <button onclick="showMyOrders('buyer')" class="bg-blue-500 text-white py-2 rounded-xl w-full">🛒 طلباتي</button>
                <button onclick="showWalletModal()" class="bg-emerald-500 text-white py-2 rounded-xl w-full">💰 سجل المحفظة</button>
                ${currentUser.role === 'admin'? `

// ======================== 39. نظام البلاغات ========================
window.reportItem = (targetType, targetId, targetName) => {
    showModal(`
        <h3 class="font-bold text-lg mb-3">🚨 الإبلاغ عن ${targetType === 'service' ? 'خدمة' : 'مستخدم'}</h3>
        <p class="text-sm text-slate-600 mb-3">${targetName}</p>

        <div class="space-y-3">
            <div>
                <label class="block text-sm font-bold mb-1">سبب البلاغ</label>
                <select id="reportReason" class="w-full border rounded-xl p-2">
                    <option value="">اختر السبب</option>
                    <option value="spam">محتوى مزعج / سبام</option>
                    <option value="fraud">احتيال / نصب</option>
                    <option value="inappropriate">محتوى غير لائق</option>
                    <option value="fake">معلومات مزيفة</option>
                    <option value="illegal">نشاط غير قانوني</option>
                    <option value="other">أخرى</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold mb-1">وصف المشكلة</label>
                <textarea id="reportDescription" rows="3" class="w-full border rounded-xl p-2"
                    placeholder="اشرح المشكلة بالتفصيل..."></textarea>
            </div>

            <button onclick="submitReport('${targetType}', '${targetId}')" class="bg-red-600 text-white py-2 rounded-xl w-full font-bold">
                إرسال البلاغ
            </button>

            <p class="text-xs text-slate-500 text-center">
                البلاغات الكاذبة قد تؤدي لحظر حسابك
            </p>
        </div>
    `);
};

window.submitReport = async (targetType, targetId) => {
    const reason = document.getElementById('reportReason').value;
    const description = document.getElementById('reportDescription').value.trim();

    if (!reason) {
        showToast('اختر سبب البلاغ', 'error');
        return;
    }

    try {
        const result = await apiCall('/api/reports/create', 'POST', {
            uid: currentUser.uid,
            targetType,
            targetId,
            reason,
            description
        });

        document.querySelector(".modal-backdrop")?.remove();

        if (result.autoResolved) {
            showToast('✅ تم اتخاذ إجراء تلقائي', 'success');
        } else {
            showToast('✅ تم إرسال بلاغك للمشرف', 'success');
        }
    } catch (error) {
        showToast(error.message || 'فشل إرسال البلاغ', 'error');
    }
};

// ======================== 40. التقارير المالية للمشرف ========================
window.showFinancialReport = async () => {
    if (currentUser.role !== 'admin') return;

    const today = new Date();
    const monthAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);

    const data = await apiCall(`/api/admin/financial-report?adminUid=${currentUser.uid}&startDate=${monthAgo.toISOString()}&endDate=${today.toISOString()}`);

    showModal(`
        <h3 class="font-bold text-xl mb-4">💰 التقرير المالي</h3>
        <p class="text-sm text-slate-600 mb-4">آخر 30 يوم</p>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="bg-green-50 p-3 rounded-xl">
                <p class="text-xs text-slate-600">النقاط المكتسبة</p>
                <p class="text-xl font-bold text-green-600">${data.points.earned}</p>
            </div>
            <div class="bg-red-50 p-3 rounded-xl">
                <p class="text-xs text-slate-600">النقاط المصروفة</p>
                <p class="text-xl font-bold text-red-600">${data.points.spent}</p>
            </div>
            <div class="bg-blue-50 p-3 rounded-xl">
                <p class="text-xs text-slate-600">الطلبات المكتملة</p>
                <p class="text-xl font-bold text-blue-600">${data.orders.completed}</p>
            </div>
            <div class="bg-purple-50 p-3 rounded-xl">
                <p class="text-xs text-slate-600">معدل التحويل</p>
                <p class="text-xl font-bold text-purple-600">${data.orders.conversionRate}%</p>
            </div>
        </div>

        <div class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white p-4 rounded-xl mb-4">
            <p class="text-sm opacity-90">إجمالي الإيرادات</p>
            <p class="text-3xl font-bold">${data.orders.totalRevenue.toFixed(2)} ريال</p>
        </div>

        <div>
            <p class="font-bold text-sm mb-2">🏆 أفضل البائعين</p>
            ${data.topSellers.map((s, i) => `
                <div class="flex justify-between items-center py-2 border-b">
                    <div class="flex items-center gap-2">
                        <span class="bg-amber-100 text-amber-700 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">${i + 1}</span>
                        <div>
                            <p class="text-sm font-bold">${s.name}</p>
                            <p class="text-xs text-slate-500">${s.orders} طلب</p>
                        </div>
                    <span class="text-green-600 font-bold text-sm">${s.revenue.toFixed(2)} ر.س</span>
                </div>
            `).join('') || '<p class="text-center text-slate-500 text-sm">لا توجد بيانات</p>'}
        </div>
    `);
};

// تحديث لوحة المشرف لإضافة التقارير
const originalShowAdminDashboard = window.showAdminDashboard;
window.showAdminDashboard = async () => {
    await originalShowAdminDashboard();

    setTimeout(() => {
        const modalContent = document.querySelector('.modal-backdrop .space-y-2');
        if (modalContent && currentUser.role === 'admin') {
            const reportBtn = document.createElement('button');
            reportBtn.className = 'bg-emerald-600 text-white py-2 rounded-xl w-full';
            reportBtn.innerHTML = '<i class="fa-solid fa-chart-pie"></i> التقرير المالي';
            reportBtn.onclick = showFinancialReport;
            modalContent.appendChild(reportBtn);
        }
    }, 100);
};

// إضافة زر بلاغ في عرض الخدمة
const originalViewService = window.viewService;
window.viewService = async (id, fromPage = null) => {
    await originalViewService(id, fromPage);

    setTimeout(() => {
        const modalContent = document.querySelector('.modal-backdrop .p-4');
        if (modalContent) {
            const s = allServices.find(x => x.id === id);
            if (s && s.userId !== currentUser.uid) {
                const reportBtn = document.createElement('button');
                reportBtn.className = 'mt-2 bg-red-100 text-red-600 w-full py-2 rounded-xl text-sm';
                reportBtn.innerHTML = '<i class="fa-solid fa-flag"></i> إبلاغ عن الخدمة';
                reportBtn.onclick = () => reportItem('service', id, s.productName);
                modalContent.appendChild(reportBtn);
            }
        }
    }, 100);
};
    </script>
